<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#123B63"/><g id="title"><text x="56" y="78" font-family="Microsoft YaHei, Arial, sans-serif" font-size="40" font-weight="700" fill="#F7F9FC">鸿蒙端分层：ArkTS + ArkUI + Repository</text><text x="56" y="114" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#EAF0F7">页面与数据源解耦，支持从本地 Mock 到 HTTP 后端的平滑切换</text></g><g id="architecture"><rect x="70" y="190" width="220" height="250" rx="8" fill="#EAF0F7"/><rect x="350" y="190" width="220" height="250" rx="8" fill="#EAF0F7"/><rect x="630" y="190" width="220" height="250" rx="8" fill="#EAF0F7"/><rect x="910" y="190" width="220" height="250" rx="8" fill="#EAF0F7"/><text x="180" y="260" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="700" fill="#123B63">HarmonyOS</text><text x="180" y="305" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#536273">ArkTS · ArkUI</text><text x="460" y="260" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="700" fill="#123B63">UseCase</text><text x="460" y="305" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#536273">Repository</text><text x="740" y="260" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="700" fill="#123B63">REST API</text><text x="740" y="305" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#536273">NestJS Service</text><text x="1020" y="260" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="700" fill="#123B63">Data</text><text x="1020" y="305" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#536273">Prisma · SQLite</text><line x1="290" y1="315" x2="350" y2="315" stroke="#E63B46" stroke-width="5"/><line x1="570" y1="315" x2="630" y2="315" stroke="#E63B46" stroke-width="5"/><line x1="850" y1="315" x2="910" y2="315" stroke="#E63B46" stroke-width="5"/></g><g id="takeaway"><use data-icon="phosphor-duotone/shield-check" x="80" y="520" width="54" height="54" fill="#18A38A"/><text x="160" y="552" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" fill="#F7F9FC">Token 鉴权 + 统一 code-message-data 响应，让端侧交互保持可预测。</text></g><text x="1200" y="680" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#EAF0F7">03</text></svg>
