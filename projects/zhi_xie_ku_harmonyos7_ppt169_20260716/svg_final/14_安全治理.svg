<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#F5F8FC" /><text x="60" y="75" font-family="Microsoft YaHei, Arial, sans-serif" font-size="38" font-weight="bold" fill="#0B1F3A">关键审批不只追求快，更要求可控与可追溯</text><g id="rules"><path fill="#FFFFFF" d="M78,160 H542 A8,8 0 0 1 550,168 V512 A8,8 0 0 1 542,520 H78 A8,8 0 0 1 70,512 V168 A8,8 0 0 1 78,160 Z" /><text x="110" y="220" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#F59E0B">阈值规则</text><text x="110" y="290" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#1F2937">报销金额超过 5000 元</text><text x="110" y="345" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#1F2937">采购金额超过 10000 元</text><text x="110" y="420" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">触发二次安全确认</text></g><g id="audit"><path fill="#FFFFFF" d="M708,160 H1172 A8,8 0 0 1 1180,168 V512 A8,8 0 0 1 1172,520 H708 A8,8 0 0 1 700,512 V168 A8,8 0 0 1 708,160 Z" /><text x="740" y="220" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#0F9F6E">安全审计链</text><text x="740" y="290" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#1F2937">权限校验 → 二次确认</text><text x="740" y="345" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#1F2937">审批结果 → 通知生成</text><text x="740" y="420" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">关键操作写入业务记录与审计日志</text></g><text x="1210" y="680" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#94A3B8">14</text></svg>