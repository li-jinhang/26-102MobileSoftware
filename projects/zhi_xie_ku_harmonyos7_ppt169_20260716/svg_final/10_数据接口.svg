ial, sans-serif" font-size="25" fill="#1F2937">认证</text><text x="230" y="410" font-family="Microsoft YaHei, Arial, sans-serif" font-size="25" fill="#1F2937">知识</text><text x="370" y="410" font-family="Microsoft YaHei, Arial, sans-serif" font-size="25" fill="#1F2937">流程</text><text x="510" y="410" font-family="Microsoft YaHei, Arial, sans-serif" font-size="25" fill="#1F2937">通知</text><text x="650" y="410" font-family="Microsoft YaHei, Arial, sans-serif" font-size="25" fill="#1F2937">考勤</text><text x="790" y="410" font-family="Microsoft YaHei, Arial, sans-serif" font-size="25" fill="#1F2937">邮件</text><text x="930" y="410" font-family="Microsoft YaHei, Arial, sans-serif" font-size="25" fill="#1F2937">助手</text><line x1="90" y1="440" x2="1110" y2="440" stroke="#D8E1EE" stroke-width="3" /><text x="70" y="510" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">统一响应格式：code / message / data；模型与接口边界为真实服务和后续数据库迁移提供基础。</text></g><text x="1210" y="680" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#94A3B8">10</text></svg>