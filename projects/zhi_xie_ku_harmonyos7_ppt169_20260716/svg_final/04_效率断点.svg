<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"><g id="background"><rect width="1280" height="720" fill="#FFFFFF" /></g><g id="header"><text x="60" y="75" font-family="Microsoft YaHei, Arial, sans-serif" font-size="38" font-weight="bold" fill="#0B1F3A">传统路径链路长、容易漏项，且审批依据不可见</text></g><g id="old-path"><path fill="#F5F8FC" stroke="#D8E1EE" d="M78,145 H572 A8,8 0 0 1 580,153 V607 A8,8 0 0 1 572,615 H78 A8,8 0 0 1 70,607 V153 A8,8 0 0 1 78,145 Z" /><text x="110" y="200" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#F59E0B">传统协作路径</text><text x="110" y="270" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#1F2937">找制度 → 问同事 → 填表</text><text x="110" y="330" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#1F2937">等待审批 → 追问进度</text><text x="110" y="420" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">查找成本高</text><text x="110" y="460" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">字段容易遗漏</text><text x="110" y="500" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">审批依据不统一</text></g><g id="new-path"><path fill="#F5F8FC" stroke="#D8E1EE" d="M708,145 H1202 A8,8 0 0 1 1210,153 V607 A8,8 0 0 1 1202,615 H708 A8,8 0 0 1 700,607 V153 A8,8 0 0 1 708,145 Z" /><text x="740" y="200" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#0F9F6E">智协库协作路径</text><text x="740" y="270" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#1F2937">问一句 → 看依据 → 直接发起</text><text x="740" y="330" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#1F2937">状态可见 → 通知留痕</text><text x="740" y="420" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">知识与流程联动</text><text x="740" y="460" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">统一待办与消息</text><text x="740" y="500" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">高风险操作可审计</text></g><g id="footer"><text x="1210" y="680" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#94A3B8">04</text></g></svg>