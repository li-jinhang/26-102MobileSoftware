<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#F5F8FC" /><text x="60" y="75" font-family="Microsoft YaHei, Arial, sans-serif" font-size="38" font-weight="bold" fill="#0B1F3A">先做可控的业务助手，再逐步开放系统级能力</text><g id="current"><path fill="#FFFFFF" d="M88,165 H552 A8,8 0 0 1 560,173 V547 A8,8 0 0 1 552,555 H88 A8,8 0 0 1 80,547 V173 A8,8 0 0 1 88,165 Z" /><text x="120" y="225" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#0F9F6E">当前可演示</text><text x="120" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1F2937">文本/图片输入</text><text x="120" y="350" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1F2937">知识匹配与流程意图</text><text x="120" y="400" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1F2937">表单草稿与人工确认</text></g><g id="future"><path fill="#FFFFFF" d="M728,165 H1192 A8,8 0 0 1 1200,173 V547 A8,8 0 0 1 1192,555 H728 A8,8 0 0 1 720,547 V173 A8,8 0 0 1 728,165 Z" /><text x="760" y="225" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#F59E0B">平台预留能力</text><text x="760" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1F2937">Agent 编排</text><text x="760" y="350" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1F2937">Skill：查制度 / 发起流程 / 查看待办</text><text x="760" y="400" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1F2937">闪控窗、碰一碰、数字身份、数字盾</text><text x="760" y="475" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" fill="#64748B">均为规划，不宣称已发布。</text></g><text x="1210" y="680" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#94A3B8">18</text></svg>