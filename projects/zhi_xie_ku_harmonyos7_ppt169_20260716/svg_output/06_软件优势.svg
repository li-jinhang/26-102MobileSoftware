<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#F5F8FC"/><text x="60" y="75" font-family="Microsoft YaHei, Arial, sans-serif" font-size="38" font-weight="bold" fill="#0B1F3A">优势不止于功能齐全，而是将业务链路缩短</text><g id="benefits"><rect x="60" y="160" width="270" height="390" rx="8" fill="#FFFFFF"/><rect x="350" y="160" width="270" height="390" rx="8" fill="#FFFFFF"/><rect x="640" y="160" width="270" height="390" rx="8" fill="#FFFFFF"/><rect x="930" y="160" width="270" height="390" rx="8" fill="#FFFFFF"/><text x="90" y="240" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#1677FF">集中入口</text><text x="90" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">减少应用切换</text><text x="380" y="240" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#1677FF">知识联动</text><text x="380" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">减少填单错误</text><text x="670" y="240" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#14B8A6">状态可视</text><text x="670" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">减少人工催办</text><text x="960" y="240" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#F59E0B">安全留痕</text><text x="960" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">关键操作可审计</text></g><text x="1210" y="680" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#94A3B8">06</text></svg>
