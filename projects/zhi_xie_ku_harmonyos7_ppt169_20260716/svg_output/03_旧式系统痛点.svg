<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720"><g id="background"><rect width="1280" height="720" fill="#F5F8FC"/></g><g id="header"><text x="60" y="70" font-family="Microsoft YaHei, Arial, sans-serif" font-size="38" font-weight="bold" fill="#0B1F3A">知识、流程与待办分散，造成协作摩擦</text><text x="60" y="104" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#64748B">问题并非单个功能缺失，而是入口、依据、状态和责任链同时割裂。</text></g><g id="fishbone"><line x1="110" y1="390" x2="1010" y2="390" stroke="#0B1F3A" stroke-width="5"/><polygon points="1010,390 1060,350 1060,430" fill="#F59E0B"/><rect x="1060" y="340" width="160" height="100" rx="8" fill="#0B1F3A"/><text x="1140" y="382" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="21" font-weight="bold" fill="#FFFFFF">低效且难追溯</text><text x="1140" y="412" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#FFFFFF">的内部协作</text><line x1="280" y1="390" x2="160" y2="220" stroke="#1677FF" stroke-width="3"/><line x1="470" y1="390" x2="350" y2="560" stroke="#1677FF" stroke-width="3"/><line x1="660" y1="390" x2="540" y2="220" stroke="#1677FF" stroke-width="3"/><line x1="850" y1="390" x2="730" y2="560" stroke="#1677FF" stroke-width="3"/><line x1="950" y1="390" x2="900" y2="220" stroke="#1677FF" stroke-width="3"/></g><g id="causes"><text x="90" y="195" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#1677FF">入口分散</text><text x="90" y="225" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#64748B">制度难检索</text><text x="280" y="610" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#1677FF">流程脱节</text><text x="280" y="640" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#64748B">填写缺少依据</text><text x="470" y="195" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#1677FF">待办滞后</text><text x="470" y="225" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#64748B">状态通知不同步</text><text x="660" y="610" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#1677FF">权限模糊</text><text x="660" y="640" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#64748B">责任边界不清</text><text x="830" y="195" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#F59E0B">风控缺位</text><text x="830" y="225" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#64748B">关键操作难留痕</text></g><g id="footer"><text x="1210" y="680" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#94A3B8">03</text></g></svg>
