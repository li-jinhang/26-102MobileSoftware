<g id="agenda-1"><circle cx="132" cy="200" r="30" fill="#1677FF"/><text x="132" y="208" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">01</text><text x="200" y="198" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="bold" fill="#1F2937">业务痛点</text><text x="200" y="228" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#64748B">解释旧式协作系统为何效率低、难追溯</text></g>
