<g id="agenda-3"><circle cx="132" cy="400" r="30" fill="#1677FF"/><text x="132" y="408" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">03</text><text x="200" y="398" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="bold" fill="#1F2937">工程实现</text><text x="200" y="428" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#64748B">展示 ArkTS/ArkUI、NestJS、Prisma 与 SQLite 的职责边界</text></g>
