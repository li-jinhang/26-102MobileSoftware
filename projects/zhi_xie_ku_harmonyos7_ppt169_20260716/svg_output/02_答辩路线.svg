<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
<g id="background"><rect width="1280" height="720" fill="#FFFFFF"/></g><g id="header"><text x="64" y="80" font-family="Microsoft YaHei, Arial, sans-serif" font-size="38" font-weight="bold" fill="#0B1F3A">从问题出发，证明方案价值与工程落地</text><rect x="64" y="104" width="1152" height="3" fill="#D8E1EE"/></g>
