<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#FFFFFF"/><text x="60" y="75" font-family="Microsoft YaHei, Arial, sans-serif" font-size="38" font-weight="bold" fill="#0B1F3A">将自然语言问题转化为知识答案与下一步操作</text><g id="dialog"><rect x="80" y="155" width="630" height="410" rx="8" fill="#F5F8FC" stroke="#D8E1EE"/><text x="120" y="220" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">员工提问</text><rect x="120" y="245" width="500" height="70" rx="8" fill="#1677FF"/><text x="145" y="288" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#FFFFFF">报销打车费需要什么材料？</text><text x="120" y="370" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">助手回答</text><rect x="120" y="395" width="520" height="125" rx="8" fill="#FFFFFF"/><text x="145" y="438" font-family="Microsoft YaHei, Arial, sans-serif" font-size="21" fill="#1F2937">发票、行程截图和事由说明。</text><text x="145" y="478" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#64748B">同时推荐《差旅报销制度》与报销申请入口。</text></g><g id="action"><rect x="790" y="155" width="380" height="410" rx="8" fill="#F5F8FC" stroke="#D8E1EE"/><text x="830" y="230" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="bold" fill="#0B1F3A">下一步行动</text><text x="830" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="21" fill="#1677FF">关联知识</text><text x="830" y="350" font-family="Microsoft YaHei, Arial, sans-serif" font-size="21" fill="#1677FF">推荐流程</text><text x="830" y="400" font-family="Microsoft YaHei, Arial, sans-serif" font-size="21" fill="#1677FF">最近问答记录</text><text x="830" y="490" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" fill="#64748B">当前以可解释的匹配与服务接口实现；真实大模型作为后续扩展。</text></g><text x="1210" y="680" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#94A3B8">13</text></svg>
