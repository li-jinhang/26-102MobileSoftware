<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#F5F8FC"/><text x="60" y="75" font-family="Microsoft YaHei, Arial, sans-serif" font-size="38" font-weight="bold" fill="#0B1F3A">FormExtensionAbility 将工作台摘要同步到桌面服务卡片</text><g id="card"><rect x="105" y="175" width="360" height="360" rx="8" fill="#FFFFFF" stroke="#1677FF" stroke-width="3"/><text x="145" y="230" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="#0B1F3A">智协库 · 工作摘要</text><text x="145" y="310" font-family="Microsoft YaHei, Arial, sans-serif" font-size="42" font-weight="bold" fill="#1677FF">3</text><text x="220" y="310" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">项待办</text><text x="145" y="390" font-family="Microsoft YaHei, Arial, sans-serif" font-size="42" font-weight="bold" fill="#14B8A6">5</text><text x="220" y="390" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#64748B">条未读</text><text x="145" y="475" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#0B1F3A">点击进入对应页面</text></g><g id="sync"><text x="650" y="235" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold" fill="#0B1F3A">摘要同步路径</text><text x="650" y="310" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1677FF">工作台摘要</text><text x="650" y="365" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1677FF">Preferences 持久化</text><text x="650" y="420" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#1677FF">formProvider 更新卡片</text><text x="650" y="475" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#64748B">只同步摘要，不复制流程状态机。</text></g><text x="1210" y="680" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#94A3B8">16</text></svg>
