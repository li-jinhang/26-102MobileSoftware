<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#FFFFFF"/><text x="60" y="75" font-family="Microsoft YaHei, Arial, sans-serif" font-size="38" font-weight="bold" fill="#0B1F3A">四类角色覆盖使用、审批、维护与治理边界</text><g id="roles"><line x1="640" y1="190" x2="220" y2="350" stroke="#1677FF" stroke-width="3"/><line x1="640" y1="190" x2="500" y2="350" stroke="#1677FF" stroke-width="3"/><line x1="640" y1="190" x2="780" y2="350" stroke="#1677FF" stroke-width="3"/><line x1="640" y1="190" x2="1060" y2="350" stroke="#1677FF" stroke-width="3"/><rect x="490" y="140" width="300" height="90" rx="8" fill="#0B1F3A"/><text x="640" y="195" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" fill="#FFFFFF">协作权限模型</text><text x="220" y="390" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="bold" fill="#1677FF">普通员工</text><text x="220" y="430" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#64748B">查知识 · 发起流程</text><text x="500" y="390" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="bold" fill="#1677FF">审批人</text><text x="500" y="430" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#64748B">处理待办 · 看依据</text><text x="780" y="390" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="bold" fill="#14B8A6">知识管理员</text><text x="780" y="430" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#64748B">维护 · 发布知识</text><text x="1060" y="390" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="bold" fill="#F59E0B">系统管理员</text><text x="1060" y="430" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#64748B">角色 · 模板 · 审计</text></g><text x="1210" y="680" text-anchor="end" font-