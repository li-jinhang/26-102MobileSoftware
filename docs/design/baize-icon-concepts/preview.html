<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; width: 1536px; height: 720px; background: #eef1f5; font-family: Arial, "Microsoft YaHei", sans-serif; color: #1f2329; }
    main { padding: 56px 64px; }
    h1 { margin: 0 0 10px; font-size: 34px; letter-spacing: 0; }
    p { margin: 0 0 36px; color: #646a73; font-size: 18px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
    .concept { background: #fff; border: 1px solid #dee0e3; border-radius: 8px; padding: 28px; display: grid; grid-template-columns: 230px 1fr; align-items: center; min-height: 430px; }
    .concept img { width: 220px; height: 220px; }
    .meta { padding-left: 22px; }
    .letter { color: #3370ff; font-size: 15px; font-weight: 700; }
    h2 { margin: 8px 0 12px; font-size: 26px; letter-spacing: 0; }
    .desc { margin: 0; font-size: 15px; line-height: 1.7; color: #646a73; }
    .small { display: flex; align-items: center; gap: 14px; margin-top: 24px; color: #8f959e; font-size: 13px; }
    .small img { width: 52px; height: 52px; border-radius: 12px; }
  </style>
</head>
<body>
  <main>
    <h1>白泽 · 应用图标概念</h1>
    <p>企业协作 × 通晓万物 × 鸿蒙分层图标</p>
    <section class="grid">
      <article class="concept">
        <img src="baize-a-insight.svg" alt="A">
        <div class="meta"><div class="letter">方向 A · 推荐</div><h2>灵角慧眼</h2><div class="desc">双角代表感知，慧眼代表理解。识别度最高，最符合“白泽通晓万物”的品牌内核。</div><div class="small"><img src="baize-a-insight.svg" alt="A small">桌面缩小预览</div></div>
      </article>
      <article class="concept">
        <img src="baize-b-codex.svg" alt="B">
        <div class="meta"><div class="letter">方向 B</div><h2>万卷灵枢</h2><div class="desc">灵角与书页融合，更强调知识库、制度与流程。企业感最强，但神话气质较弱。</div><div class="small"><img src="baize-b-codex.svg" alt="B small">桌面缩小预览</div></div>
      </article>
      <article class="concept">
        <img src="baize-c-constellation.svg" alt="C">
        <div class="meta"><div class="letter">方向 C</div><h2>万象星图</h2><div class="desc">角冠与星图节点结合，表现组织、知识与流程的连接。科技感强，细节相对更多。</div><div class="small"><img src="baize-c-constellation.svg" alt="C small">桌面缩小预览</div></div>
      </article>
    </section>
  </main>
</body>
</html>
